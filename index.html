<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GitHub Star 增长看板（近30天）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #F1F5F9 0%, #E8EEF6 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container { max-width: 1280px; width: 100%; }
        .header { margin-bottom: 30px; }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #1E6FDF 0%, #3B82F6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-subtitle { font-size: 14px; color: #64748B; margin-top: 8px; }
        .config-panel {
            background: #FFFFFF;
            padding: 20px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
            border: 1px solid #E9EEF5;
            margin-bottom: 16px;
        }
        .config-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .config-row .field-group { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 240px; }
        .config-panel label { font-size: 14px; font-weight: 600; color: #475569; white-space: nowrap; }
        .config-panel input {
            flex: 1; min-width: 160px; border: 1px solid #E2E8F0; border-radius: 12px;
            padding: 10px 16px; font-size: 14px; background: #F8FAFE; color: #0F172A;
            transition: all 0.2s ease; font-family: inherit;
        }
        .config-panel input::placeholder { color: #94A3B8; }
        .config-panel input:focus {
            outline: none; border-color: #1E6FDF; background: #ffffff;
            box-shadow: 0 0 0 3px rgba(30,111,223,0.1);
        }
        .config-panel button {
            border: none; padding: 10px 20px; border-radius: 12px; font-weight: 600;
            font-size: 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        #saveTokenBtn { background: #F1F5F9; color: #1E6FDF; border: 1px solid #E2E8F0; }
        #saveTokenBtn:hover { background: #E2E8F0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,111,223,0.15); }
        #refreshBtn { background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; border: none; }
        #refreshBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        #refreshBtn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .status-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .status-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 16px;
            background: #F8FAFE; border-radius: 12px; font-size: 13px; color: #475569; border: 1px solid #E9EEF5;
        }
        .status-item .icon { font-size: 16px; }
        .status-item strong { color: #0F172A; font-weight: 600; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .status-badge.success { background: #D1FAE5; color: #065F46; }
        .status-badge.warning { background: #FEF3C7; color: #92400E; }
        .status-badge.error { background: #FEE2E2; color: #991B1B; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .loading-spinner {
            width: 48px; height: 48px; border: 4px solid #E2E8F0; border-top-color: #1E6FDF;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #64748B; font-weight: 500; }
        .loading-progress {
            width: 200px; height: 4px; background: #E2E8F0; border-radius: 2px;
            margin-top: 12px; overflow: hidden;
        }
        .loading-progress-bar {
            height: 100%; background: linear-gradient(90deg, #1E6FDF, #3B82F6);
            border-radius: 2px; transition: width 0.3s ease; width: 0%;
        }
        .status-message {
            font-size: 13px; color: #64748B; margin-top: 12px; text-align: center;
            padding: 10px 16px; background: #FFFFFF; border-radius: 12px; border: 1px solid #E9EEF5;
        }
        .status-message.error { color: #DC2626; background: #FEF2F2; border-color: #FECACA; }
        .status-message.success { color: #059669; background: #F0FDF4; border-color: #BBF7D0; }
        .retry-btn {
            background: #1E6FDF; color: white; border: none; padding: 6px 16px;
            border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
            margin-left: 12px; transition: all 0.2s;
        }
        .retry-btn:hover { background: #0F59B5; }
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px; margin-bottom: 32px;
        }
        .metric-card {
            background: #FFFFFF; border-radius: 20px; padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05); text-align: center;
            transition: all 0.2s ease; border: 1px solid #E9EEF5;
        }
        .metric-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .metric-card .label { font-size: 13px; color: #64748B; margin-bottom: 10px; font-weight: 500; }
        .metric-card .value {
            font-size: 36px; font-weight: 800;
            background: linear-gradient(135deg, #1E6FDF 0%, #3B82F6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .metric-card .sub { font-size: 13px; color: #10B981; margin-top: 8px; font-weight: 500; }
        .metric-card .highlight {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .table-card {
            background: #FFFFFF; border-radius: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 28px; margin-bottom: 32px; border: 1px solid #E9EEF5;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #F1F5F9;
        }
        .card-title { font-size: 18px; font-weight: 700; color: #0F172A; }
        .card-sub { font-size: 12px; color: #94A3B8; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .stats-table th, .stats-table td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #F1F5F9; }
        .stats-table th { font-weight: 600; background: #F8FAFE; color: #475569; }
        .stats-table tr:hover { background: #F8FAFE; }
        .growth-positive { color: #10B981; font-weight: 600; }
        .growth-negative { color: #EF4444; font-weight: 600; }
        .footer { text-align: center; font-size: 12px; color: #94A3B8; margin-top: 40px; padding: 16px; }
        @media (max-width: 768px) {
            .header-top { flex-direction: column; }
            .config-row { flex-direction: column; align-items: stretch; }
            .config-row .field-group { min-width: 100%; }
            .config-panel button { width: 100%; }
            .status-bar { flex-direction: column; align-items: stretch; }
            .metric-card .value { font-size: 28px; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-top">
            <div>
                <h1>⭐ GitHub Star 增长看板</h1>
                <div class="header-subtitle">支持任意 GitHub 仓库的 Star 近30天增长分析</div>
            </div>
        </div>
        <div class="config-panel">
            <div class="config-row">
                <div class="field-group">
                    <label for="repoInput">📦 仓库</label>
                    <input type="text" id="repoInput" placeholder="owner/repo（默认 rustfs/rustfs）">
                </div>
                <div class="field-group">
                    <label for="githubToken">🔑 Token</label>
                    <input type="password" id="githubToken" placeholder="ghp_xxx（可选，提高限额）">
                </div>
                <button id="saveTokenBtn">💾 保存配置</button>
                <button id="refreshBtn"> 刷新数据</button>
            </div>
        </div>
        <div class="status-bar">
            <div class="status-item">
                <span class="icon">📦</span>
                <span>仓库：<strong id="repoStatus">rustfs/rustfs</strong></span>
            </div>
            <div class="status-item">
                <span class="icon"></span>
                <span>状态：<span id="tokenStatus" class="status-badge warning">未配置 Token</span></span>
            </div>
        </div>
    </div>
    <div id="statusMsg" class="status-message">正在加载数据...</div>
    <div class="cards-grid" id="metricsPanel">
        <div class="metric-card">
            <div class="label">最新 Star 总数</div>
            <div class="value" id="totalStars">--</div>
            <div class="sub" id="updateTime"></div>
        </div>
        <div class="metric-card">
            <div class="label">近30天累计增长</div>
            <div class="value" id="totalGrowth">--</div>
            <div class="sub" id="growthPercent"></div>
        </div>
        <div class="metric-card">
            <div class="label">平均每天日增</div>
            <div class="value" id="avgDaily">--</div>
            <div class="sub">stars/天</div>
        </div>
        <div class="metric-card">
            <div class="label">本周 vs 上周</div>
            <div class="value" id="weekCompare">--</div>
            <div class="sub" id="weekCompareSub"></div>
        </div>
    </div>
    <div class="table-card" id="tableCard">
        <div class="card-header">
            <div class="card-title">📅 每日增长数据表</div>
            <div class="card-sub">近30天每日 Star 增长明细</div>
        </div>
        <div style="overflow-x: auto;">
            <table class="stats-table" id="dailyTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>当日新增</th>
                        <th>累计总数</th>
                        <th>环比增速</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="footer">💡 数据基于 GitHub GraphQL API，取每日最后一条记录。已缓存1小时。可配置 Token 提升限额。</div>
</div>
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">正在获取数据...</div>
    <div class="loading-progress">
        <div class="loading-progress-bar" id="loadingProgressBar"></div>
    </div>
</div>
<script>
    (function() {
        let currentDailyData = [];
        const STORAGE_KEY = 'github_star_data';
        const TOKEN_KEY = 'github_token';
        const REPO_KEY = 'github_repo';
        const DEFAULT_REPO = 'rustfs/rustfs';
        const CACHE_HOURS = 1;
        const GRAPHQL_URL = 'https://api.github.com/graphql';
        const repoInput = document.getElementById('repoInput');
        const tokenInput = document.getElementById('githubToken');
        const saveTokenBtn = document.getElementById('saveTokenBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const statusDiv = document.getElementById('statusMsg');
        const repoStatusDiv = document.getElementById('repoStatus');
        const tokenStatusDiv = document.getElementById('tokenStatus');
        const totalStarsSpan = document.getElementById('totalStars');
        const totalGrowthSpan = document.getElementById('totalGrowth');
        const growthPercentSpan = document.getElementById('growthPercent');
        const avgDailySpan = document.getElementById('avgDaily');
        const weekCompareSpan = document.getElementById('weekCompare');
        const weekCompareSubSpan = document.getElementById('weekCompareSub');
        const updateTimeSpan = document.getElementById('updateTime');
        const tableBody = document.getElementById('tableBody');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingProgressBar = document.getElementById('loadingProgressBar');

        function showLoading(text = '正在获取数据...', progress = 0) {
            loadingText.textContent = text;
            loadingProgressBar.style.width = `${progress}%`;
            loadingOverlay.classList.add('active');
        }
        function hideLoading() { loadingOverlay.classList.remove('active'); }
        function showStatus(msg, type = 'info') {
            statusDiv.className = 'status-message';
            if (type === 'error') statusDiv.classList.add('error');
            else if (type === 'success') statusDiv.classList.add('success');
            statusDiv.innerHTML = msg;
        }
        function getRepo() { return localStorage.getItem(REPO_KEY) || DEFAULT_REPO; }
        function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
        function showConfigState() {
            const repo = getRepo();
            const token = getToken();
            repoStatusDiv.textContent = repo;
            if (token) {
                tokenStatusDiv.className = 'status-badge success';
                tokenStatusDiv.textContent = '已配置';
            } else {
                tokenStatusDiv.className = 'status-badge warning';
                tokenStatusDiv.textContent = '未配置 Token';
            }
        }
        function getCacheKey(repo) { return `${STORAGE_KEY}_${repo}`; }
        function saveConfig() {
            const token = tokenInput.value.trim();
            const repo = repoInput.value.trim() || getRepo();
            if (token !== '') localStorage.setItem(TOKEN_KEY, token);
            localStorage.setItem(REPO_KEY, repo);
            showConfigState();
            showStatus('✔ 配置已保存，请点击"刷新数据"获取最新统计', 'success');
            tokenInput.value = '';
            repoInput.value = repo;
            tokenInput.placeholder = '已保存 Token';
            repoInput.placeholder = repo;
        }
        async function graphqlFetch(query, variables = {}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(GRAPHQL_URL, {
                method: 'POST',
                headers,
                body: JSON.stringify({ query, variables })
            });
            if (!response.ok) {
                const body = await response.text();
                if (response.status === 401) throw new Error('Token 无效或已过期，请重新配置');
                if (response.status === 403) throw new Error('API 限额已用完，请配置有效的 GitHub Token');
                throw new Error(`GraphQL API 错误: ${response.status} ${response.statusText}`);
            }
            const data = await response.json();
            if (data.errors) {
                const errorMsg = data.errors.map(e => e.message).join(', ');
                if (errorMsg.includes('bad credentials') || errorMsg.includes('unauthorized')) {
                    throw new Error('Token 无效或已过期，请重新配置');
                }
                throw new Error(`GraphQL 错误: ${errorMsg}`);
            }
            return data.data;
        }
        async function fetchStarsLast30Days(sinceTime = null) {
            const repo = getRepo();
            const [owner, name] = repo.split('/');
            showLoading(`正在获取 ${repo} 的 Star 数据...`, 10);
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            const startTime = thirtyDaysAgo.toISOString();
            const batchSize = 100;
            const query = `
                query($owner: String!, $name: String!) {
                    repository(owner: $owner, name: $name) {
                        stargazerCount
                    }
                }
            `;
            const data = await graphqlFetch(query, { owner, name });
            const totalStars = data.repository.stargazerCount;
            console.log(`仓库总 Star 数: ${totalStars}`);
            console.log(`30天前的时间: ${startTime}`);
            if (sinceTime) {
                console.log(`增量更新：从 ${sinceTime} 开始获取`);
                showLoading(`正在获取新增 Star 数据...`, 20);
            } else {
                showLoading(`正在获取近30天 Star 数据...`, 20);
            }
            const allStars = [];
            let cursor = null;
            let pageCount = 0;
            let hasNextPage = true;
            const maxPages = 50;
            const startTime_ms = Date.now();
            const effectiveStartTime = sinceTime || startTime;
            while (hasNextPage && pageCount < maxPages) {
                pageCount++;
                const fetchQuery = `
                    query($owner: String!, $name: String!, $first: Int!, $after: String) {
                        repository(owner: $owner, name: $name) {
                            stargazers(first: $first, after: $after, orderBy: {field: STARRED_AT, direction: DESC}) {
                                edges { starredAt }
                                pageInfo { hasNextPage endCursor }
                            }
                        }
                    }
                `;
                const variables = { owner, name, first: batchSize, after: cursor };
                const pageStart = Date.now();
                const pageData = await graphqlFetch(fetchQuery, variables);
                const pageTime = Date.now() - pageStart;
                const edges = pageData.repository.stargazers.edges;
                const pageInfo = pageData.repository.stargazers.pageInfo;
                let shouldStop = false;
                for (const edge of edges) {
                    const starredAt = edge.starredAt;
                    if (starredAt >= effectiveStartTime) {
                        allStars.push({ starred_at: starredAt });
                    } else {
                        shouldStop = true;
                        break;
                    }
                }
                hasNextPage = pageInfo.hasNextPage;
                cursor = pageInfo.endCursor;
                console.log(`第 ${pageCount} 批: ${edges.length} 条, 耗时 ${pageTime}ms`);
                const progress = 20 + Math.round((pageCount / maxPages) * 75);
                showLoading(`正在获取 Star 数据：第 ${pageCount} 批 (${pageTime}ms)`, progress);
                if (shouldStop) break;
            }
            const totalTime = Date.now() - startTime_ms;
            showLoading('数据处理中...', 95);
            console.log(`总共获取了 ${allStars.length} 个 Star`);
            console.log(`获取了 ${pageCount} 批数据`);
            console.log(`总耗时: ${totalTime}ms`);
            if (allStars.length > 0) {
                console.log('最早的 Star:', allStars[allStars.length - 1].starred_at);
                console.log('最新的 Star:', allStars[0].starred_at);
            }
            allStars.sort((a, b) => new Date(a.starred_at) - new Date(b.starred_at));
            return { totalStars, stars: allStars, lastStarTime: allStars.length > 0 ? allStars[0].starred_at : null };
        }
        function computeDailyData(stars, totalStars) {
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 29);
            startDate.setHours(0, 0, 0, 0);
            const dateCounts = new Map();
            stars.forEach(star => {
                const date = new Date(star.starred_at);
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                dateCounts.set(dateStr, (dateCounts.get(dateStr) || 0) + 1);
            });
            const baseStars = Math.max(0, totalStars - stars.length);
            const result = [];
            let cumulative = baseStars;
            const endDate = new Date();
            endDate.setHours(23, 59, 59, 999);
            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const dailyCount = dateCounts.get(dateStr) || 0;
                cumulative += dailyCount;
                result.push({ date: dateStr, delta: dailyCount, total: cumulative });
            }
            for (let i = 0; i < result.length; i++) {
                if (i === 0) {
                    result[i].rate = null;
                } else {
                    result[i].rate = result[i - 1].total > 0
                        ? (result[i].delta / result[i - 1].total * 100).toFixed(2) + '%'
                        : '0.00%';
                }
            }
            return result;
        }
        function renderUI(dailyData, totalStars) {
            if (!dailyData || dailyData.length === 0) return;
            currentDailyData = dailyData;
            const last = dailyData[dailyData.length - 1];
            const first = dailyData[0];
            const totalGrowth = last.total - first.total;
            const starsBefore30Days = first.total;
            const totalGrowthPercent = starsBefore30Days > 0
                ? (totalGrowth / starsBefore30Days * 100).toFixed(2)
                : '0.00';
            const days = dailyData.length - 1;
            const avgDaily = days > 0 ? (totalGrowth / days).toFixed(1) : '0';
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            const dayOfWeek = today.getDay();
            const daysSinceMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const thisWeekStart = new Date(today);
            thisWeekStart.setDate(today.getDate() - daysSinceMonday);
            thisWeekStart.setHours(0, 0, 0, 0);
            const lastWeekStart = new Date(thisWeekStart);
            lastWeekStart.setDate(lastWeekStart.getDate() - 7);
            const lastWeekEnd = new Date(thisWeekStart);
            lastWeekEnd.setDate(lastWeekEnd.getDate() - 1);
            lastWeekEnd.setHours(23, 59, 59, 999);
            const weekBeforeLastStart = new Date(lastWeekStart);
            weekBeforeLastStart.setDate(weekBeforeLastStart.getDate() - 7);
            const weekBeforeLastEnd = new Date(lastWeekStart);
            weekBeforeLastEnd.setDate(weekBeforeLastEnd.getDate() - 1);
            weekBeforeLastEnd.setHours(23, 59, 59, 999);
            let thisWeekGrowth = 0;
            let lastWeekGrowth = 0;
            let weekBeforeLastGrowth = 0;
            dailyData.forEach(item => {
                const itemDate = new Date(item.date + 'T23:59:59');
                if (itemDate >= thisWeekStart && itemDate <= today) {
                    thisWeekGrowth += item.delta;
                }
                if (itemDate >= lastWeekStart && itemDate <= lastWeekEnd) {
                    lastWeekGrowth += item.delta;
                }
                if (itemDate >= weekBeforeLastStart && itemDate <= weekBeforeLastEnd) {
                    weekBeforeLastGrowth += item.delta;
                }
            });
            const weekDiff = lastWeekGrowth - weekBeforeLastGrowth;
            const weekPercent = weekBeforeLastGrowth > 0
                ? ((weekDiff / weekBeforeLastGrowth) * 100).toFixed(1)
                : '0.0';
            const formatDate = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
            const weekRanges = `${formatDate(lastWeekStart)}-${formatDate(lastWeekEnd)} vs ${formatDate(weekBeforeLastStart)}-${formatDate(weekBeforeLastEnd)}`;
            totalStarsSpan.innerText = totalStars.toLocaleString();
            totalGrowthSpan.innerText = totalGrowth > 0 ? `+${totalGrowth}` : `${totalGrowth}`;
            growthPercentSpan.innerText = `▲ ${totalGrowthPercent}%`;
            avgDailySpan.innerText = `~${avgDaily}`;
            if (weekDiff > 0) {
                weekCompareSpan.innerHTML = `<span class="highlight">+${weekDiff}</span>`;
                weekCompareSubSpan.innerHTML = `上周 ${lastWeekGrowth} | 上上周 ${weekBeforeLastGrowth} <span class="growth-positive">▲ ${weekPercent}%</span><br><span style="font-size:11px;color:#94A3B8">本周(${formatDate(thisWeekStart)}起) ${thisWeekGrowth}</span>`;
            } else if (weekDiff < 0) {
                weekCompareSpan.innerHTML = `<span class="growth-negative">${weekDiff}</span>`;
                weekCompareSubSpan.innerHTML = `上周 ${lastWeekGrowth} | 上上周 ${weekBeforeLastGrowth} <span class="growth-negative">▼ ${Math.abs(weekPercent)}%</span><br><span style="font-size:11px;color:#94A3B8">本周(${formatDate(thisWeekStart)}起) ${thisWeekGrowth}</span>`;
            } else {
                weekCompareSpan.innerText = '0';
                weekCompareSubSpan.innerHTML = `上周 ${lastWeekGrowth} | 上上周 ${weekBeforeLastGrowth}<br><span style="font-size:11px;color:#94A3B8">本周(${formatDate(thisWeekStart)}起) ${thisWeekGrowth}</span>`;
            }
            updateTimeSpan.innerText = `更新: ${new Date().toLocaleString('zh-CN')}`;
            tableBody.innerHTML = '';
            dailyData.slice().reverse().forEach(item => {
                const row = tableBody.insertRow();
                row.insertCell(0).innerText = item.date;
                const deltaCell = row.insertCell(1);
                if (item.delta > 0) deltaCell.innerHTML = `<span class="growth-positive">+${item.delta}</span>`;
                else if (item.delta < 0) deltaCell.innerHTML = `<span class="growth-negative">${item.delta}</span>`;
                else deltaCell.innerText = '—';
                row.insertCell(2).innerText = item.total.toLocaleString();
                const rateCell = row.insertCell(3);
                if (item.rate) rateCell.innerHTML = `<span class="growth-positive">+${item.rate}</span>`;
                else rateCell.innerText = '—';
            });
            showStatus(`✅ 数据已更新 · 共 ${dailyData.length} 天数据`, 'success');
        }
        async function loadData(forceRefresh = false) {
            showConfigState();
            refreshBtn.disabled = true;
            const repo = getRepo();
            const now = Date.now();
            let cached = null;
            const cacheKey = getCacheKey(repo);
            const raw = localStorage.getItem(cacheKey);
            if (raw) {
                try {
                    cached = JSON.parse(raw);
                } catch (e) {}
            }
            if (!forceRefresh && cached && (now - cached.timestamp) < CACHE_HOURS * 3600 * 1000) {
                showStatus('📦 使用缓存数据（1小时内有效）', 'success');
                renderUI(cached.dailyData, cached.totalStars);
                refreshBtn.disabled = false;
                return;
            }
            try {
                let stars = [];
                let totalStars = 0;
                if (cached && cached.lastStarTime && !forceRefresh) {
                    const result = await fetchStarsLast30Days(cached.lastStarTime);
                    const cachedStars = cached.stars || [];
                    stars = [...cachedStars, ...result.stars];
                    stars.sort((a, b) => new Date(a.starred_at) - new Date(b.starred_at));
                    stars = stars.filter((star, index, self) =>
                        index === self.findIndex(s => s.starred_at === star.starred_at)
                    );
                    totalStars = result.totalStars;
                    console.log(`合并后共 ${stars.length} 个 Star（缓存 ${cachedStars.length} + 新增 ${result.stars.length}）`);
                } else {
                    const result = await fetchStarsLast30Days();
                    stars = result.stars;
                    totalStars = result.totalStars;
                }
                const dailyData = computeDailyData(stars, totalStars);
                localStorage.setItem(cacheKey, JSON.stringify({
                    timestamp: now,
                    dailyData: dailyData,
                    totalStars: totalStars,
                    stars: stars,
                    lastStarTime: stars.length > 0 ? stars[stars.length - 1].starred_at : null
                }));
                hideLoading();
                renderUI(dailyData, totalStars);
            } catch (err) {
                console.error(err);
                hideLoading();
                const errorMsg = err.message.includes('限额')
                    ? `❌ ${err.message}<button class="retry-btn" onclick="document.getElementById('githubToken').focus()">配置 Token</button>`
                    : `❌ 获取失败: ${err.message}<button class="retry-btn" id="retryBtn">重试</button>`;
                showStatus(errorMsg, 'error');
                const retryBtn = document.getElementById('retryBtn');
                if (retryBtn) retryBtn.addEventListener('click', () => loadData(true));
                if (cached) {
                    setTimeout(() => {
                        showStatus('⚠️ 使用过期缓存数据', 'error');
                        renderUI(cached.dailyData, cached.totalStars);
                    }, 2000);
                }
            } finally {
                refreshBtn.disabled = false;
            }
        }
        saveTokenBtn.addEventListener('click', saveConfig);
        refreshBtn.addEventListener('click', () => loadData(true));
        const savedToken = getToken();
        const savedRepo = getRepo();
        if (savedToken) tokenInput.placeholder = '已保存 Token';
        if (savedRepo) repoInput.placeholder = savedRepo;
        showConfigState();
        loadData(false);
    })();
</script>
</body>
